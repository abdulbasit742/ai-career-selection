name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run --silent demo > /tmp/recommendation.json
      - run: node -e "JSON.parse(require('node:fs').readFileSync('/tmp/recommendation.json', 'utf8'))"
